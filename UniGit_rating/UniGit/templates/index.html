<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniGit - Лидерборд</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Nav */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 500;
            text-decoration: none;
            color: var(--text-main);
            font-family: ui-serif, Georgia, serif;
        }

        .logo svg {
            color: #ffffff;
            /* White star */
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-outline {
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            transition: 0.2s;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-white {
            background: var(--text-main);
            color: #000;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .btn-white:hover {
            opacity: 0.9;
        }





        /* Main Hero */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 24px;
        }

        .hero h1 {
            font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
            font-size: clamp(48px, 8vw, 96px);
            font-weight: 400;
            margin: 0 0 24px 0;
            letter-spacing: -0.02em;
        }

        .hero p {
            font-size: clamp(18px, 2.5vw, 24px);
            color: var(--text-muted);
            max-width: 800px;
            margin: 0 auto 48px;
            line-height: 1.5;
            font-weight: 400;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }

        .btn-primary {
            background: #f4f4f5;
            color: #000;
            padding: 16px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 18px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .btn-primary:hover {
            background: #e4e4e7;
        }

        .btn-secondary {
            background: #27272a;
            border: 1px solid #3f3f46;
            color: #f4f4f5;
            padding: 16px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 18px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .btn-secondary:hover {
            background: #3f3f46;
        }

        .hero-footer {
            color: var(--text-muted);
            font-size: 16px;
        }

        .nav-links-center {
            display: none;
        }

        @media (min-width: 768px) {
            .nav-links-center {
                display: flex;
                position: absolute;
                left: 50%;
                transform: translateX(-50%);
                gap: 24px;
            }

            .nav-links-center a {
                color: var(--text-muted);
                text-decoration: none;
                font-size: 14px;
            }

            .nav-links-center a:hover {
                color: var(--text-main);
            }
        }
    </style>
</head>

<body>
    <!-- Top Navigation -->
    <div class="top-nav">
        <a href="/" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
            </svg>
            UniGit
        </a>

        <div class="nav-links-center">
            <a href="{% url 'ranking' %}">Лидерборд</a>
            <a href="{% url 'about' %}">О проекте</a>
            <a href="{% url 'for_companies' %}">Для Компаний</a>
        </div>

        <div class="top-actions">
            {% if request.user.is_authenticated %}
            <a href="{% url 'profile' %}" class="btn-outline">Профиль</a>
            <a href="/accounts/logout/" class="btn-white">Выйти</a>
            {% else %}
            <a href="/accounts/login/" class="btn-outline">Войти</a>
            <a href="/accounts/signup/" class="btn-white">Начать</a>
            {% endif %}

        </div>
    </div>



    <!-- Hero Section -->
    <section class="hero">
        <h1>UniGit</h1>
        <p>Соревнуйтесь, развивайтесь и побеждайте в рейтингах IT-студентов Казахстана.</p>

        <div class="hero-buttons">
            <a href="{% url 'profile' %}" class="btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
                </svg>
                Подключить GitHub
            </a>
            <a href="{% url 'ranking' %}" class="btn-secondary">
                Смотреть лидерборд
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="7" y1="17" x2="17" y2="7"></line>
                    <polyline points="7 7 17 7 17 17"></polyline>
                </svg>
            </a>
        </div>

        <div class="hero-footer">
            Доступно для всех студентов IT университетов.
        </div>
    </section>

</body>

</html>
